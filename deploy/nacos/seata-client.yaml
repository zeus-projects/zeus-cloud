seata:
  enabled: true
  tx-service-group: zeus_tx_group
  service:
    vgroupMapping:
      zeus_tx_group: default
  registry:
    type: nacos
    nacos:
      application: ${SEATA_APPLICATION:seata-server}
      server-addr: ${NACOS_HOST:zeus-nacos}:${NACOS_PORT:8848}
      group: ${SEATA_GROUP:SEATA_GROUP}
      namespace: ${NACOS_NAMESPACE:}
  data-source-proxy-mode: XA
